<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <select>
        <option value="">Select a city</option>
        <option value="">London</option>
        <option value="">New York</option>
        <option value="">Oakland</option>
      </select>
      <div class="city">
        <div>
          <h2>Los Angeles 🇺🇸</h2>
          <div class="date"></div>
        </div>
        <div class="time">15:26 <small>AM</small></div>
      </div>
      <div class="city">
        <h2>Tenerife 🇮🇨</h2>
        <div class="date"></div>
        <div class="time">15:26 <small>AM</small></div>
      </div>
    </div>
    <footer>
      This project was coded by
      <strong> <a href="https://github.com/Gabcii">Gabriella Derzsi</a></strong
      >, open-sourced on
      <a href="https://github.com/Gabcii/world-clock">Github </a> and hosted on
      <a href="https://world-clock-gabby.netlify.app/">Netlify</a>.
    </footer>
    <script src="src/index.js"></script>
  </body>
</html>
